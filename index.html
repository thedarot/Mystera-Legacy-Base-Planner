<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="description" content="Calculate the materials cost to build structures in the world of Mystera Legacy.">

        <title>Mystera Legacy Base Planner</title>

        <style>
            html, body {
                height: 100%
            }

            body {
                font-family: monospace;
                display: flex;
                margin: 0;
                background-color: #222;
                overflow: hidden
            }

            canvas {
                min-width: 0;
                flex: 1 1 0;
                image-rendering: crisp-edges;
                user-select: none;
                cursor: crosshair
            }

            #mats {
                color: #ddd;
                flex: 1 1 0;
                margin: 0;
                overflow-y: auto;
                background: #333;
                padding: 10px;
                border-radius: 4px;
            }

            #left {
                flex: 0 0 320px;
                padding: 1em;
                display: flex;
                flex-direction: column;
                gap: 1em;
                overflow-y: auto; /* Permite rolar o menu lateral se tiver muitas categorias */
            }

            /* Títulos em CapsLock e Maiores */
            .category-title {
                text-transform: uppercase;
                font-weight: bold;
                font-size: 14px;
                color: #fff;
                margin-bottom: 5px;
                margin-top: 10px;
            }

            /* Retângulos fixos para cada categoria */
            .category-box {
                border-radius: .5em;
                padding: .5em;
                background-color: #fff;
                display: grid;
                grid-template-columns: repeat(7, 1fr);
                gap: .5em;
            }

            #list div {
                cursor: pointer;
                border-radius: 2px;
                image-rendering: crisp-edges;
                width: 32px;
                height: 32px;
                background-image: url("map.png");
                background-size: 512px 320px; 
            }

            #list div:focus {
                outline: 2px solid #07f
            }

            section {
                font-size: 12px;
                color: #888;
                word-break: break-all;
                margin-top: auto;
            }

            span {
                color: #fff
            }
        </style>
    </head>

    <body>

            <pre id="mats"></pre>

            <div style="display: flex; flex-direction: column; gap: 8px;">

                <div id="baseSize" style="color: #aaa; font-size: 13px; text-align: center;">Tamanho: 0x0</div>
                
                <button id="btnExport" style="padding: 6px; cursor: pointer; border-radius: 4px; border: none; background: #eee;">Export materials list (.txt)</button>
                
                <div style="display: flex; gap: 8px;">
                    <button id="btnSave" style="flex: 1; padding: 6px; cursor: pointer; border-radius: 4px; border: none; background: #eee;">Save your project</button>
                    <button id="btnLoad" style="flex: 1; padding: 6px; cursor: pointer; border-radius: 4px; border: none; background: #eee;">Upload a project</button>
                </div>
                <input type="file" id="fileInput" accept=".json" style="display: none;">
            </div>

            <section>
                Planner &middot; <span>Kyōsan Edits 🪴🐈</span>
